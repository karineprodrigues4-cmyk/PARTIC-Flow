<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PARTIC Flow</title>
</head>
<body>
<script>
  // If coming from login button, show React app (don't redirect)
  if (window.location.search.includes('direct=1')) {
    // Remove the param and let React load
    window.history.replaceState({}, '', '/');
  } else {
    // First visit - go to landing
    window.location.href = '/landing.html';
  }
</script>
</body>
</html>
